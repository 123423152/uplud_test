<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>האתר הראשון שלי</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f8ff;
            padding: 50px;
        }

        h1 {
            color: #0066cc;
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>שלום עולם! 🌍</h1>
    <p>זה האתר הראשון שלי.</p>

    <button onclick="sayHello()">לחץ עליי</button>

    <script>
        function sayHello() {
            alert("שלום יואב!");
        }
    </script>

</body>
</html>
